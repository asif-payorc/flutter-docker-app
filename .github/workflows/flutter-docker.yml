name: Flutter APK Build (Docker)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build APK using Flutter Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ghcr.io/cirruslabs/flutter:3.41.6 \
            bash -c "
              echo '--- Flutter Version ---' &&
              flutter --version &&

              echo '--- Fix SDK Cache ---' &&
              rm -rf /sdks/flutter/bin/cache &&

              echo '--- Initialize Flutter ---' &&
              flutter doctor &&

              echo '--- Clean Project ---' &&
              flutter clean &&

              echo '--- Repair Pub Cache ---' &&
              flutter pub cache repair &&

              echo '--- Get Dependencies ---' &&
              flutter pub get &&

              echo '--- Build APK ---' &&
              flutter build apk --release
            "

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
